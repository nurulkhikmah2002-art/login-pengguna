<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi LPK Takashi Japan</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #bc002d; /* Merah Jepang */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            width: 90%;
            max-width: 450px;
        }
        h2 { color: #bc002d; margin-bottom: 5px; }
        .info { color: #666; font-size: 14px; margin-bottom: 20px; }
        
        /* Gaya area kamera */
        #reader {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            border: none !important;
        }
        #reader__dashboard_section_csr button {
            background-color: #bc002d !important;
            color: white !important;
            border: none !important;
            padding: 10px 20px !important;
            border-radius: 5px !important;
            cursor: pointer;
        }
        #result-box {
            margin-top: 15px;
            padding: 10px;
            display: none;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>SELAMAT DATANG</h2>
    <p style="font-weight: bold; margin-top: 0;">LPK TAKASHI JAPAN</p>
    <div class="info">Arahkan QR Code ke kamera</div>

    <div id="reader"></div>
    <div id="result-box"></div>
</div>

<script>
    const resultBox = document.getElementById('result-box');

    function onScanSuccess(decodedText, decodedResult) {
        // Tampilkan notifikasi sukses
        resultBox.style.display = 'block';
        resultBox.style.backgroundColor = '#d4edda';
        resultBox.style.color = '#155724';
        resultBox.innerHTML = `Berhasil Scan: ${decodedText}`;

        // Suara bip jika diperlukan
        console.log(`Scan Result: ${decodedText}`);

        // Berhenti scan agar tidak double data
        html5QrcodeScanner.clear().then(_ => {
            // Logika lanjut: Kirim ke Google Sheets di sini
            // Setelah 3 detik, siapkan untuk scan berikutnya
            setTimeout(() => {
                location.reload(); 
            }, 3000);
        });
    }

    function onScanFailure(error) {
        // Tidak perlu menampilkan error scan gagal di sini agar tidak mengganggu
    }

    let html5QrcodeScanner = new Html5QrcodeScanner(
        "reader", 
        { 
            fps: 15, 
            qrbox: {width: 250, height: 250},
            aspectRatio: 1.0,
            rememberLastUsedCamera: true
        }
    );

    html5QrcodeScanner.render(onScanSuccess, onScanFailure);
</script>

</body>
</html>
